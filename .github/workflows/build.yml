name: Build Check

on:
  push:
    branches:
      - main
#    paths:
#      - '**.java'
#      - 'pom.xml'
  pull_request:
    branches:
      - main
#    paths:
#      - '**.java'
#      - 'pom.xml'
jobs:

  backend:
    name: Backend Build (Spring Boot)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven

      - name: Build with Maven
#        run: mvn clean verify -DskipTests=false
        run: mvn clean package -DskipTests

  frontend:
    name: Frontend Build (Vue)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
#          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -d "frontend" ]; then
            cd frontend
            npm install
          fi

      - name: Build frontend
        run: |
          if [ -d "frontend" ]; then
            cd frontend
            npm run build
          fi

